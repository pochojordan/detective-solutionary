<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LOGIC GRID PRO - CASE SOLVER</title>
    <style>
        :root { 
            --bg: #0b0d0f; 
            --card: #161a1e; 
            --accent: #d4af37; 
            --text: #e0e0e0; 
            --ok: #27ae60; 
            --x: #e74c3c; 
            --border: #333; 
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow: hidden; 
        }

        /* PANTALLA DE CONFIGURACIÓN */
        #setup-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            transition: 0.5s; 
        }
        .setup-card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 15px; 
            border: 1px solid var(--accent); 
            width: 500px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
        }
        .history-panel {
            margin-top: 25px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .history-list {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }
        .history-item {
            background: #1c2128;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }
        .history-item:hover {
            border-color: var(--accent);
            background: #252a31;
        }
        .history-item .date { color: #666; font-size: 0.75rem; }
        .hidden { opacity: 0; pointer-events: none; transform: translateY(-20px); }

        /* PANTALLA DE JUEGO */
        #game-screen { 
            display: grid; 
            grid-template-columns: 320px 1fr 320px; 
            grid-template-rows: 70px 1fr; 
            height: 100vh; 
            gap: 15px; 
            padding: 15px; 
            box-sizing: border-box; 
        }

        header { 
            grid-column: 1 / -1; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent); 
            padding: 0 20px; 
            background: var(--card);
            border-radius: 8px;
        }

        .side-panel { 
            background: var(--card); 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
        }

        .board-center { 
            background: #000; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: auto; 
            border: 1px solid #222; 
        }

        /* TABLA Y CENTRADO QUIRÚRGICO */
        table { border-collapse: separate; border-spacing: 3px; }
        
        td, th { 
            width: 65px; 
            height: 65px; 
            border: 1px solid #333; 
            position: relative; 
            padding: 0; 
            background: #1c2128;
            border-radius: 4px;
        }

        /* Solo las celdas con ID (las de juego) tienen cursor pointer */
        td[id] { cursor: pointer; }

        /* Resaltado Inteligente via CSS (más eficiente) */
        tr:hover td { background: rgba(212, 175, 55, 0.08) !important; }
        
        /* Resaltado de columna mediante hack de colgroup o similar es complejo, 
           usaremos una clase simple para la fila y JS minimalista para la columna si es necesario,
           pero primero arreglemos la fila que es lo más crítico */
        .highlight-row { background: rgba(212, 175, 55, 0.15) !important; }

        /* Este contenedor garantiza el centrado total */
        .cell-content {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 38px;
            line-height: 1;
            pointer-events: none;
            user-select: none;
        }

        /* Etiquetas */
        .label { background: #252a31; color: var(--accent); font-size: 11px; font-weight: bold; }
        .label-v { 
            width: 150px; 
            text-align: right; 
            padding-right: 15px; 
            font-size: 14px; 
            border-right: 4px solid var(--accent);
            white-space: nowrap;
        }
        .label-h { height: 120px; vertical-align: bottom; padding-bottom: 15px; }
        .label-h div { transform: rotate(-90deg); width: 30px; margin: 0 auto; white-space: nowrap; }

        /* Estados de celda */
        .ok-mark { background: var(--ok) !important; color: white !important; }
        .x-mark .cell-content { color: var(--x) !important; font-weight: bold; }

        /* Resaltado Inteligente */
        .highlight-row { background: rgba(212, 175, 55, 0.15) !important; }
        .highlight-cell { background: rgba(212, 175, 55, 0.3) !important; border-color: var(--accent) !important; }

        /* Separadores de Ejes */
        .border-left-thick { border-left: 3px solid var(--accent) !important; }
        .border-top-thick { border-top: 3px solid var(--accent) !important; }

        /* INTERFAZ */
        input, textarea { background: #222; border: 1px solid #444; color: white; padding: 10px; width: 100%; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--accent); color: black; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 5px; text-transform: uppercase; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        .clue-item { background: #1c2128; padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 0.9rem; border-left: 4px solid var(--accent); display: flex; gap: 10px; align-items: center; }
        #timer { 
            font-size: 24px; 
            color: var(--accent); 
            font-family: 'Courier New', monospace; 
            font-weight: bold;
            background: #000;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            display: flex;
            gap: 8px;
            align-items: baseline;
        }
        .timer-unit { font-size: 14px; color: #666; margin-left: -4px; text-transform: uppercase; }

    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h2 style="color: var(--accent); text-align:center; letter-spacing: 4px; margin-bottom:30px;">DEDUCTION PROTOCOL</h2>
            <label>Título del Caso:</label>
            <input type="text" id="caseName" value="Misterio en Hollywood">
            <label>Sospechosos (separados por comas):</label>
            <input type="text" id="inS" value="Aureolina, Tercero, Obsidiana">
            <label>Lugares:</label>
            <input type="text" id="inL" value="Baño, Dormitorio, Cine">
            <label>Armas:</label>
            <input type="text" id="inA" value="Tenedor, Tubería, Vela">
            <label>Extra (Opcional - ej. Horas):</label>
            <input type="text" id="inE" placeholder="10h, 12h, 14h (dejar vacío si no aplica)">
            
            <button onclick="startGame()" style="width:100%; margin-top:20px; font-size: 1.1rem;">GENERAR ESCENARIO</button>

            <div class="history-panel">
                <h4 style="color: var(--accent); margin: 0 0 10px 0; font-size: 0.9rem;">EXPEDIENTES RECIENTES</h4>
                <div id="setupHistory" class="history-list">
                    <!-- Cargado dinámicamente -->
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <header>
            <div id="currentCaseTitle" style="font-size: 1.1rem; letter-spacing: 2px;">CASO: ---</div>
            <div id="timer">00:00:00</div>
            <div style="display:flex; gap:10px;">
                <button onclick="saveInProgress()" style="background:var(--ok); color:white; padding: 5px 15px;">GUARDAR</button>
                <button onclick="undo()" style="background:#444; color:white; padding: 5px 15px;">DESHACER</button>
                <button onclick="showSetup()" style="background:var(--x); color:white; padding: 5px 15px;">SALIR</button>
            </div>
        </header>

        <aside class="side-panel">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="startTimer()" style="background:var(--ok); color:white; flex:1; font-size: 1.2rem;">▶</button>
                <button onclick="pauseTimer()" style="background:#f1c40f; color:black; flex:1; font-size: 1.2rem;">⏸</button>
                <button onclick="resetTimer()" style="background:#555; color:white; flex:1; font-size: 1.2rem;">⟳</button>
            </div>

            <h4 style="color: var(--accent); margin-top:0;">MANUAL RÁPIDO</h4>
            <div style="font-size: 0.8rem; background: #000; padding: 10px; border-radius: 5px; color: #bbb; margin-bottom:20px;">
                • <b>Click Izquierdo:</b> Poner/Quitar <b>✕</b><br>
                • <b>Click Derecho:</b> Poner <b>✔</b><br>
                • <b>Deducción:</b> El sistema tacha automát.
            </div>
            
            <h4 style="color: var(--accent);">NOTAS DE CAMPO</h4>
            <textarea id="notes" style="flex-grow: 1; resize: none;" placeholder="Anota pistas complejas aquí..."></textarea>
        </aside>

        <main class="board-center">
            <div id="board"></div>
        </main>

        <aside class="side-panel">
            <h4 style="color: var(--accent); margin-top:0;">ARCHIVO DE PISTAS</h4>
            <div style="display:flex; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="newClue" placeholder="Nueva pista..." style="margin:0;">
                <button onclick="addClue()" style="width: 50px; margin:0;">+</button>
            </div>
            <div id="cluesList"></div>
        </aside>
    </div>

    <script>
        let S, L, A, E;
        let history = [];
        let timerSeconds = 0;
        let timerInterval = null;

        function startGame(savedData) {
            const name = savedData ? savedData.name : document.getElementById('caseName').value;
            const suspects = savedData ? savedData.s : document.getElementById('inS').value;
            const locations = savedData ? savedData.l : document.getElementById('inL').value;
            const weapons = savedData ? savedData.a : document.getElementById('inA').value;
            const extra = savedData ? savedData.e : document.getElementById('inE').value;

            S = suspects.split(',').map(x => x.trim()).filter(x => x);
            L = locations.split(',').map(x => x.trim()).filter(x => x);
            A = weapons.split(',').map(x => x.trim()).filter(x => x);
            E = extra ? extra.split(',').map(x => x.trim()).filter(x => x) : [];

            if (!savedData) {
                saveSetupToHistory(name, suspects, locations, weapons, extra);
            }

            document.getElementById('currentCaseTitle').innerText = "CASO: " + name.toUpperCase();
            document.getElementById('setup-screen').classList.add('hidden');
            history = [];
            render();

            if(savedData && savedData.progress) {
                loadProgress(savedData.progress);
            }
        }

        function saveSetupToHistory(name, s, l, a, e) {
            let hist = JSON.parse(localStorage.getItem('detective_history') || '[]');
            const newItem = { name, s, l, a, e, date: new Date().toLocaleString(), progress: null };
            if (hist.length > 0 && hist[0].name === name && hist[0].s === s && !hist[0].progress) return;
            hist.unshift(newItem);
            if (hist.length > 10) hist.pop();
            localStorage.setItem('detective_history', JSON.stringify(hist));
            updateSetupHistoryUI();
        }

        function saveInProgress() {
            const cells = Array.from(document.querySelectorAll('td[id]')).map(td => ({ 
                id: td.id, 
                className: td.className, 
                text: td.querySelector('.cell-content').innerText 
            }));
            const currentState = {
                cells,
                notes: document.getElementById('notes').value,
                timer: timerSeconds,
                clues: document.getElementById('cluesList').innerHTML
            };

            let hist = JSON.parse(localStorage.getItem('detective_history') || '[]');
            if(hist.length > 0) {
                hist[0].progress = currentState; // Guarda en el caso actual (el primero)
                hist[0].date = new Date().toLocaleString() + " (EN CURSO)";
                localStorage.setItem('detective_history', JSON.stringify(hist));
                alert("Progreso guardado en el expediente actual.");
                updateSetupHistoryUI();
            }
        }

        function loadProgress(progress) {
            progress.cells.forEach(c => {
                const td = document.getElementById(c.id);
                if(td) {
                    td.className = c.className;
                    td.querySelector('.cell-content').innerText = c.text;
                }
            });
            document.getElementById('notes').value = progress.notes || "";
            timerSeconds = progress.timer || 0;
            document.getElementById('cluesList').innerHTML = progress.clues || "";
            updateTimerDisplay();
        }

        function updateSetupHistoryUI() {
            const hist = JSON.parse(localStorage.getItem('detective_history') || '[]');
            const container = document.getElementById('setupHistory');
            if (hist.length === 0) {
                container.innerHTML = '<div style="color:#555; font-size:0.8rem; font-style:italic;">No hay casos anteriores</div>';
                return;
            }
            container.innerHTML = hist.map((item, index) => `
                <div class="history-item" onclick='startGame(${JSON.stringify(item)})'>
                    <div>
                        <span style="display:block; font-weight:bold;">${item.name}</span>
                        <span class="date">${item.date}</span>
                    </div>
                    ${item.progress ? '<span style="color:var(--ok); font-size:10px;">💾 GUARDADO</span>' : ''}
                </div>
            `).join('');
        }

        function showSetup() { 
            updateSetupHistoryUI();
            document.getElementById('setup-screen').classList.remove('hidden'); 
        }

        // Timer Logic
        function startTimer() { if (!timerInterval) timerInterval = setInterval(() => { timerSeconds++; updateTimerDisplay(); }, 1000); }
        function pauseTimer() { clearInterval(timerInterval); timerInterval = null; }
        function resetTimer() { pauseTimer(); timerSeconds = 0; updateTimerDisplay(); }
        function updateTimerDisplay() {
            const h = Math.floor(timerSeconds / 3600);
            const m = Math.floor((timerSeconds % 3600) / 60);
            const s = timerSeconds % 60;
            
            let html = "";
            if (h > 0) html += `${h.toString().padStart(2, '0')}<span class="timer-unit">h</span> `;
            html += `${m.toString().padStart(2, '0')}<span class="timer-unit">m</span> `;
            html += `${s.toString().padStart(2, '0')}<span class="timer-unit">s</span>`;
            
            document.getElementById('timer').innerHTML = html;
        }

        function render() {
            let html = `<table>`;
            
            const cols = [L, A, E].filter(arr => arr.length > 0);
            const rows = [S, A, E].filter(arr => arr.length > 0);

            // Cabecera
            html += `<tr><th style="border:none; background:transparent"></th>`;
            cols.forEach((arr, ai) => {
                arr.forEach((x, i) => {
                    const isFirst = ai > 0 && i === 0;
                    html += `<th class="label label-h ${isFirst ? 'border-left-thick' : ''}"><div>${x}</div></th>`;
                });
            });
            html += `</tr>`;
            
            // Cuerpo
            rows.forEach((rowArr, ri) => {
                const rowIdPrefix = ri === 0 ? 's' : (ri === 1 ? 'a' : 'e');
                const isFirstRowOfSection = ri > 0;
                
                rowArr.forEach((p, i) => {
                    html += `<tr>`;
                    html += `<th class="label label-v ${isFirstRowOfSection && i === 0 ? 'border-top-thick' : ''}">${p}</th>`;
                    
                    cols.forEach((colArr, ci) => {
                        const colIdPrefix = ci === 0 ? 'l' : (ci === 1 ? 'a' : 'e');
                        colArr.forEach((_, j) => {
                            const cellId = `${rowIdPrefix}${i}-${colIdPrefix}${j}`;
                            const isFirstColOfSection = ci > 0 && j === 0;
                            const isForbidden = (rowIdPrefix === colIdPrefix); 
                            
                            if (isForbidden) {
                                html += `<td class="${isFirstColOfSection ? 'border-left-thick' : ''} ${isFirstRowOfSection && i === 0 ? 'border-top-thick' : ''}" style="border:none; opacity:0.1; background:#222"></td>`;
                            } else {
                                html += `<td id="${cellId}" 
                                    class="${isFirstColOfSection ? 'border-left-thick' : ''} ${isFirstRowOfSection && i === 0 ? 'border-top-thick' : ''}" 
                                    onclick="handle(this,'x')" 
                                    oncontextmenu="handle(this,'ok',event)">
                                    <div class="cell-content"></div>
                                </td>`;
                            }
                        });
                    });
                    html += `</tr>`;
                });
            });
            document.getElementById('board').innerHTML = html + `</table>`;
        }

        // Action Logic
        function handle(cell, type, e) {
            if(e) e.preventDefault();
            saveState();
            const content = cell.querySelector('.cell-content');
            
            if(type === 'x') {
                if(cell.classList.contains('ok-mark')) return;
                if(cell.classList.contains('x-mark')) {
                    cell.classList.remove('x-mark');
                    content.innerText = ""; 
                } else {
                    cell.classList.add('x-mark');
                    content.innerText = "✕"; 
                }
            } else { 
                if(cell.classList.contains('ok-mark')) {
                    cell.className = '';
                    content.innerText = "";
                } else { 
                    cell.className = 'ok-mark';
                    content.innerText = "✔"; 
                    autoFill(cell);
                    runFullInference(); 
                }
            }
        }

        function autoFill(cell) {
            const [t1, i1, t2, i2] = cell.id.match(/[a-z]|\d+/g);
            document.querySelectorAll('td[id]').forEach(td => {
                if(td === cell) return;
                const [tA, iA, tB, iB] = td.id.match(/[a-z]|\d+/g);
                if((t1==tA && i1==iA && t2==tB) || (t2==tB && i2==iB && t1==tA)) {
                    if(!td.classList.contains('ok-mark')) {
                        td.classList.add('x-mark');
                        td.querySelector('.cell-content').innerText = "✕";
                    }
                }
            });
        }

        function runFullInference() {
            for(let si=0; si<S.length; si++){
                for(let li=0; li<L.length; li++){
                    for(let ai=0; ai<A.length; ai++){
                        const sl = document.getElementById(`s${si}-l${li}`).classList.contains('ok-mark');
                        const sa = document.getElementById(`s${si}-a${ai}`).classList.contains('ok-mark');
                        const al = document.getElementById(`a${ai}-l${li}`);
                        if(sl && sa && !al.classList.contains('ok-mark')) {
                            al.className = 'ok-mark';
                            al.querySelector('.cell-content').innerText = "✔";
                            autoFill(al);
                        }
                    }
                }
            }
        }

        function addClue() {
            const val = document.getElementById('newClue').value;
            if(!val) return;
            const div = document.createElement('div');
            div.className = 'clue-item';
            div.innerHTML = `<input type="checkbox"> <span>${val}</span>`;
            document.getElementById('cluesList').prepend(div);
            document.getElementById('newClue').value = '';
        }

        function saveState() {
            const cells = Array.from(document.querySelectorAll('td[id]')).map(td => ({ id: td.id, className: td.className, text: td.querySelector('.cell-content').innerText }));
            history.push(JSON.stringify({cells, notes: document.getElementById('notes').value}));
            if(history.length > 50) history.shift();
        }

        function undo() {
            if (history.length === 0) return;
            const state = JSON.parse(history.pop());
            state.cells.forEach(c => {
                const td = document.getElementById(c.id);
                td.className = c.className;
                td.querySelector('.cell-content').innerText = c.text;
            });
            document.getElementById('notes').value = state.notes;
        }

        updateSetupHistoryUI();
    </script>
</body>
</html>
